name: Check Flight Prices

on:
  schedule:
    # Runs every day at 7:00 AM UTC (10:00 AM Helsinki time)
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check flight prices
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python check_flights.py

      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/price_history.json
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git pull --rebase
          git push
